<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      margin: 0;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #1b5e8c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #154d73; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .result {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .result.success { background: #e8f5e9; color: #2e7d32; }
    .result.error   { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <button id="testBtn" class="btn">🔌 API-Verbindung jetzt testen</button>
  <div id="result" class="result"></div>

  <script>
    const btn = document.getElementById('testBtn');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = '⏳ Teste…';
      result.style.display = 'none';

      try {
        await Homey.set('btn_test_poll', true);
        result.className = 'result success';
        result.textContent = '✓ API-Abfrage ausgelöst – siehe Gerätestatus.';
      } catch (e) {
        result.className = 'result error';
        result.textContent = '✗ Fehler: ' + e.message;
      } finally {
        result.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔌 API-Verbindung jetzt testen';
      }
    });
  </script>
</body>
</html>
